<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Checker</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 50px;
            background: #03AED2;
        }

        .box {
            background: #F8DE22;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            justify-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 10px;
        }

        #strength {
            margin-top: 10px;
            font-weight: bold;
        }

        .weak { color: red; }
        .medium { color: blue; }
        .strong { color: green; }
    </style>
</head>
<div class="topbar">
    <div> Name: Ankit</div>
    <div> Sap id: 590014774</div>
</div>


<div class="box">
    <h3>Password Checker</h3>
    <input type="password" id="password" placeholder="Enter password">
    <div id="strength"></div>
</div>

<script>
$(document).ready(function(){

    $('#password').on('keyup', function(){

        let password = $(this).val();
        let score = 0;

        // 5 factors
        if(password.match(/[A-Z]/)) score++;      // Capital
        if(password.match(/[a-z]/)) score++;      // Small
        if(password.match(/[0-9]/)) score++;      // Number
        if(password.match(/[@$!%*?&]/)) score++;  // Special
        if(password.length >= 8) score++;         // Length

        let strength = "";
        let className = "";

        if(score <= 2){
            strength = "Weak ❌";
            className = "weak";
        }
        else if(score <= 4){
            strength = "Medium ⚠️";
            className = "medium";
        }
        else{
            strength = "Strong 💪";
            className = "strong";
        }

        $('#strength')
            .text(strength)
            .removeClass()
            .addClass(className);
    });

});
</script>

</body>
</html>
